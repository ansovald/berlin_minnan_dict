# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name minnan-iaaw.hu-berlin.de;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name minnan-iaaw.hu-berlin.de;

    # SSL certificate configuration
    ssl_certificate /etc/letsencrypt/live/minnan-iaaw.hu-berlin.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minnan-iaaw.hu-berlin.de/privkey.pem;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;

    # Serve static files from the build directory
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to Flask backend
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Allow access to the sutiau-mp3 directory and its subfolders
    location /sutiau-mp3 {
        alias /usr/share/nginx/html/sutiau-mp3;
        autoindex on; # Optional: Enable directory listing
    }

    # Handle React routing (fallback to index.html)
    location / {
        try_files $uri /index.html;
    }
}
